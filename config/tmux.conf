# Multivibebox tmux configuration

# Use Ctrl-a as prefix (more ergonomic than Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Enable mouse mode
set -g mouse on

# Large scrollback buffer
set -g history-limit 50000

# Pane borders with agent names
set -g pane-border-status top
set -g pane-border-format " #[fg=colour39,bold]#{pane_index}: #{pane_title}#[default] "
set -g pane-border-style "fg=colour240"
set -g pane-active-border-style "fg=colour39"

# Status bar
set -g status-style "bg=colour235,fg=colour248"
set -g status-left "#[fg=colour39,bold] mvb:#{session_name} #[default]│ "
set -g status-left-length 30
set -g status-right " %H:%M "
set -g status-interval 5

# Start pane numbering at 0
set -g base-index 0
setw -g pane-base-index 0

# Vi mode for copy
setw -g mode-keys vi

# Quick pane switching with Alt+arrow
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Reload config
bind r source-file /opt/mvb/config/tmux.conf \; display "Config reloaded"
